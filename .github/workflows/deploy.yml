name: Deploy TSURILOGUE Media to CORESERVER

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Upload wp-content customizations
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate deployment secrets
        env:
          CORE_HOST: ${{ secrets.CORE_HOST }}
          CORE_USER: ${{ secrets.CORE_USER }}
          CORE_PASSWORD: ${{ secrets.CORE_PASSWORD }}
          CORE_PORT: ${{ secrets.CORE_PORT }}
          CORE_REMOTE_PATH: ${{ secrets.CORE_REMOTE_PATH }}
        run: |
          set -euo pipefail

          missing=0
          for name in CORE_HOST CORE_USER CORE_PASSWORD CORE_PORT CORE_REMOTE_PATH; do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing GitHub Secret: ${name}"
              missing=1
            fi
          done

          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

          if ! [[ "${CORE_PORT}" =~ ^[0-9]+$ ]]; then
            echo "::error::CORE_PORT must be numeric. Use 22 for SFTP or 21 for FTP over TLS."
            exit 1
          fi

          if [ ! -d "wp-content/themes/jin-child" ]; then
            echo "::error::wp-content/themes/jin-child does not exist in this repository."
            exit 1
          fi

          if [ ! -d "wp-content/plugins/tsurilogue-seo-tools" ]; then
            echo "::error::wp-content/plugins/tsurilogue-seo-tools does not exist in this repository."
            exit 1
          fi

          echo "Deployment secrets are configured."
          echo "Upload scope: jin-child theme and TSURILOGUE SEO Tools plugin only."
          echo "Delete sync: disabled."

      - name: Install lftp
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Deploy themes and plugins
        env:
          CORE_HOST: ${{ secrets.CORE_HOST }}
          CORE_USER: ${{ secrets.CORE_USER }}
          CORE_PASSWORD: ${{ secrets.CORE_PASSWORD }}
          CORE_PORT: ${{ secrets.CORE_PORT }}
          CORE_REMOTE_PATH: ${{ secrets.CORE_REMOTE_PATH }}
        run: |
          set -euo pipefail

          REMOTE_BASE="${CORE_REMOTE_PATH%/}"

          if [ "${CORE_PORT}" = "22" ]; then
            PROTOCOL="sftp"
            SFTP_SETTINGS="set sftp:auto-confirm yes"
            TLS_SETTINGS=""
          else
            PROTOCOL="ftp"
            SFTP_SETTINGS=""
            TLS_SETTINGS=$'set ftp:ssl-force true\nset ftp:ssl-protect-data true\nset ssl:verify-certificate no'
          fi

          echo "Starting deployment to ${CORE_HOST}:${CORE_PORT}"
          echo "Protocol: ${PROTOCOL}"
          echo "Remote wp-content path: ${REMOTE_BASE}"
          echo "Uploading directories:"
          echo "- wp-content/themes/jin-child/ -> ${REMOTE_BASE}/themes/jin-child/"
          echo "- wp-content/plugins/tsurilogue-seo-tools/ -> ${REMOTE_BASE}/plugins/tsurilogue-seo-tools/"
          echo "Excluded directories are outside this upload scope or explicitly ignored."
          echo "Delete sync is disabled for safety."

          DEPLOY_SCRIPT="$(mktemp)"

          {
            echo "set cmd:fail-exit yes"
            echo "set dns:order inet"
            echo "set ftp:passive-mode yes"
            echo "set net:max-retries 1"
            echo "set net:timeout 15"
            echo "set net:reconnect-interval-base 3"
            printf '%s\n' "${SFTP_SETTINGS}"
            printf '%s\n' "${TLS_SETTINGS}"

            while IFS= read -r file; do
              remote_dir="${REMOTE_BASE}/$(dirname "${file#wp-content/}")"
              echo "put -O \"${remote_dir}\" \"${file}\""
            done < <(find wp-content/themes/jin-child wp-content/plugins/tsurilogue-seo-tools \
              -type f \
              ! -name ".DS_Store" \
              ! -path "*/.git/*" \
              | sort)

            echo "bye"
          } > "${DEPLOY_SCRIPT}"

          sed -n '/^put /p' "${DEPLOY_SCRIPT}"
          timeout 180 lftp -u "${CORE_USER},${CORE_PASSWORD}" -p "${CORE_PORT}" "${PROTOCOL}://${CORE_HOST}" -f "${DEPLOY_SCRIPT}"

          echo "Deployment finished successfully."
